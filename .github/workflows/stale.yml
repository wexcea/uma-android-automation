name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 0
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically closed due to 30 days of inactivity.
            Feel free to reopen if this is still relevant.
          stale-pr-message: >
            This pull request has been automatically closed due to 30 days of inactivity.
            Feel free to reopen if this is still relevant.
